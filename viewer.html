<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Board – Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fc; --surface: #ffffff; --surface2: #f1f2f7; --border: #d0d4e0;
  --accent: #7c5cfc; --accent2: #fc5c7d; --accent3: #5cf8c8;
  --text: #1a1a2e; --text-dim: #6b6b8a; --shadow: 0 8px 32px rgba(0,0,0,0.15);
}
body.dark {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27; --border: #2a2a3d;
  --accent: #7c5cfc; --accent2: #fc5c7d; --accent3: #5cf8c8;
  --text: #e8e8f0; --text-dim: #a0a0c0; --shadow: 0 8px 32px rgba(0,0,0,0.6);
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Syne',sans-serif; color:var(--text); user-select:none; }

/* ── TOOLBAR ── */
#toolbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:rgba(248,249,252,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; padding:0 16px; z-index:1000;
}
body.dark #toolbar { background:rgba(13,13,20,0.95); }

#toolbar .logo { font-size:15px; font-weight:800; letter-spacing:-0.5px; margin-right:12px; flex-shrink:0; }
#toolbar .logo span { color:var(--accent); }
.viewer-badge {
  font-family:'DM Mono',monospace; font-size:10px; font-weight:500;
  background:rgba(124,92,252,0.12); color:var(--accent);
  border:1px solid rgba(124,92,252,0.25); border-radius:20px;
  padding:2px 8px; letter-spacing:.5px; text-transform:uppercase; flex-shrink:0;
}

.tb-btn {
  display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; transition:all .15s; flex-shrink:0;
}
.tb-btn:hover { border-color:var(--accent); color:var(--accent); }
.tb-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.tb-sep { width:1px; height:24px; background:var(--border); margin:0 4px; flex-shrink:0; }

#project-name {
  font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim);
  margin-right:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px;
}

#search-bar {
  margin-left:auto; width:200px; padding:6px 12px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  font-family:'DM Mono',monospace; font-size:12px; outline:none; transition:border-color 0.2s;
}
#search-bar:focus { border-color:var(--accent); }
#search-tools { display:flex; align-items:center; gap:6px; margin-left:8px; }
#search-count { min-width:44px; text-align:center; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
.search-nav-btn {
  width:24px; height:24px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); cursor:pointer; line-height:1;
}
.search-nav-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── LABEL FILTER DROPDOWN ── */
#label-filter-wrapper { position:relative; }
#label-filter-dropdown {
  position:absolute; top:40px; left:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; box-shadow:var(--shadow);
  display:none; flex-direction:column;
  padding:8px; z-index:2000;
  min-width:260px; max-height:420px; overflow-y:auto;
}
#label-filter-dropdown.show { display:flex; }
.lf-section-header {
  font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim);
  text-transform:uppercase; padding:8px 4px 4px; letter-spacing:.5px;
  border-top:1px solid var(--border); margin-top:4px;
}
.lf-section-header:first-child { border-top:none; margin-top:0; }
.lf-item {
  display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:4px;
  cursor:pointer; font-family:'DM Mono',monospace; font-size:12px; color:var(--text); transition:background 0.1s;
}
.lf-item:hover { background:var(--surface2); }
.lf-item input[type="checkbox"] { cursor:pointer; accent-color:var(--accent); width:14px; height:14px; }
#lf-empty { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); padding:6px 8px; }
#lf-clear {
  margin-top:6px; padding:6px 8px; border-radius:4px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text-dim); font-family:'DM Mono',monospace;
  font-size:11px; cursor:pointer; text-align:center; transition:all .15s;
}
#lf-clear:hover { border-color:var(--accent2); color:var(--accent2); }
#lf-badge {
  background:var(--accent); color:white; border-radius:10px;
  padding:1px 6px; font-size:10px; margin-left:2px; display:none;
}

/* ── CANVAS ── */
#canvas {
  position:fixed; top:52px; left:0; right:0; bottom:0;
  overflow:hidden; cursor:grab;
}
#canvas.panning { cursor:grabbing; }
#canvas::before {
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(circle, #d0d4e0 1px, transparent 1px);
  background-size:28px 28px; pointer-events:none;
}
body.dark #canvas::before { background-image:radial-gradient(circle, #2a2a3d 1px, transparent 1px); }

#world { position:absolute; top:0; left:0; width:6000px; height:6000px; transform-origin:0 0; }

/* ── SVG LAYERS ── */
#svg-layer {
  position:absolute; top:0; left:0; width:6000px; height:6000px;
  pointer-events:none; overflow:visible; z-index:5;
}
#svg-layer .arrow-path {
  fill:none; stroke:var(--accent); stroke-width:2.5;
  pointer-events:stroke; cursor:pointer; transition:stroke .15s;
}
#svg-layer .arrow-path:hover { stroke:var(--accent2); }
#svg-layer .arrow-path.selected { stroke:var(--accent2); stroke-width:3; }
.arrow-hit { fill:none; stroke:transparent; stroke-width:16; pointer-events:stroke; cursor:pointer; }
#svg-layer .arrow-bg { fill:none; stroke:var(--surface); stroke-width:7; stroke-linejoin:round; pointer-events:none; }
#svg-layer .arrow-path.active-connection { stroke-width:3.5 !important; opacity:1; }
#svg-layer .arrow-path.arrow-dimmed { opacity:0.12; }

/* ── NODE CARDS (read-only) ── */
.node {
  position:absolute; width:220px; min-height:50px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; cursor:pointer;
  transition:border-color .15s, box-shadow .15s, filter .3s ease;
  box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden;
}
.node.shape-oval { border-radius:100px; padding:10px 20px; align-items:center; justify-content:center; }
.node.shape-area { border:2px dashed var(--border) !important; z-index:1 !important; }
.node:not(.shape-area) { z-index:10; }
.node:hover { border-color:var(--accent); }
.node.selected { border-color:var(--accent2); box-shadow:0 0 0 1px var(--accent2), 0 8px 28px rgba(252,92,125,0.2); }
.node.search-active { border-color:var(--accent2) !important; box-shadow:0 0 0 2px rgba(252,92,125,0.35) !important; }
.node.highlight { filter:brightness(1.18); box-shadow:0 0 0 4px rgba(124,92,252,0.35), 0 12px 32px rgba(124,92,252,0.25) !important; }
.node.dimmed { opacity:0.25; transition:opacity 0.3s ease; }
.node.connected-highlight {
  border-color:var(--accent3) !important;
  box-shadow:0 0 0 2px rgba(92,248,200,0.25), 0 8px 28px rgba(92,248,200,0.12) !important;
}
.node.shape-text {
  background:transparent !important; border:1px dashed transparent;
  box-shadow:none; min-height:unset; cursor:pointer;
}
.node.shape-text:hover { border-color:var(--border); }
.node.shape-text:not(.selected):not(.highlight):not(.connected-highlight):not(.search-active) {
  border-color:transparent !important; box-shadow:none !important;
}

.node-thumb { width:100%; height:90px; background:var(--surface2); overflow:hidden; position:relative; display:none; flex:1 1 auto; }
.node-thumb.has-img { display:block; }
.node-thumb img { width:100%; height:100%; object-fit:cover; }
.node-body { padding:12px 12px 10px; flex:2 1 auto; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.node.shape-oval .node-body { text-align:center; }
.node-title { font-size:14px; font-weight:600; color:#1a1a2e !important; word-break:break-word; line-height:1.3; }
.node.shape-text .node-title { font-size:16px; color:inherit !important; }
.node-note { font-size:11px; margin-top:8px; color:var(--text-dim); display:none; pointer-events:none; white-space:pre-wrap; }
.node-note.visible { display:block !important; }
.node-link {
  position:absolute; top:8px; right:8px; background:var(--accent); color:white;
  width:20px; height:20px; border-radius:4px; display:none; align-items:center;
  justify-content:center; font-size:10px; text-decoration:none; cursor:pointer; z-index:10;
}
.node-link:hover { background:var(--accent2); }

/* No resize handle, no node buttons in viewer */

/* ── PANEL ── */
#panel {
  position:fixed; top:52px; right:-380px; width:340px; bottom:0;
  background:var(--surface); border-left:1px solid var(--border); z-index:900;
  padding:24px; transition:right .3s cubic-bezier(.4,0,.2,1); overflow-y:auto;
}
#panel.open { right:0; }
#panel h2 { font-size:16px; font-weight:700; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
#panel-close { width:28px; height:28px; border-radius:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all .15s; }
#panel-close:hover { background:var(--accent2); border-color:var(--accent2); color:#fff; }

.view-line { margin-bottom:16px; }
.view-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.view-value { font-size:15px; color:var(--text); margin-top:3px; word-break:break-word; line-height:1.5; }
.view-value a { color:var(--accent); text-decoration:underline; }
.view-img { width:100%; border-radius:8px; object-fit:cover; margin-bottom:16px; border:1px solid var(--border); }

/* ── TOGGLE SWITCH ── */
.switch { position:relative; display:inline-block; width:48px; height:24px; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.4s; border-radius:34px; }
.slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:.4s; border-radius:50%; }
input:checked + .slider { background-color:#5cf8c8; }
input:checked + .slider:before { transform:translateX(24px); }

/* ── TOAST ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 20px; border-radius:8px; font-family:'DM Mono',monospace; font-size:12px; opacity:0; transition:all .3s; pointer-events:none; z-index:2000; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── LOADING ── */
#loading-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#loading-overlay .logo-big { font-size:28px; font-weight:800; }
#loading-overlay .logo-big span { color:var(--accent); }
#loading-overlay .loading-msg { font-family:'DM Mono',monospace; font-size:13px; color:var(--text-dim); }
#loading-overlay .spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── ERROR SCREEN ── */
#error-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:9998;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:32px;
}
#error-overlay.show { display:flex; }
#error-overlay .err-icon { font-size:40px; }
#error-overlay .err-title { font-size:20px; font-weight:700; }
#error-overlay .err-msg { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); text-align:center; max-width:420px; line-height:1.8; }

/* ── ZOOM CONTROLS ── */
#zoom-controls {
  position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column;
  gap:4px; z-index:800;
}
.zoom-btn {
  width:32px; height:32px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow); transition:all .15s;
}
.zoom-btn:hover { border-color:var(--accent); color:var(--accent); }
#zoom-level-indicator {
  font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim);
  text-align:center; padding:2px 0;
}

/* Export opschoning */
body.exporting .node-link { display:none !important; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="logo-big">Visual<span>Board</span></div>
  <div class="spinner"></div>
  <div class="loading-msg">Project laden…</div>
</div>

<!-- Error overlay -->
<div id="error-overlay">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Project niet gevonden</div>
  <div class="err-msg" id="err-msg">Kan het projectbestand niet laden. Controleer de URL of het bestand bestaat.<br><br>Verwacht formaat:<br><code>viewer.html?src=projects/project1.json</code></div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <div class="logo">Visual<span>Board</span></div>
  <div class="viewer-badge">Viewer</div>
  <div class="tb-sep"></div>
  <span id="project-name">—</span>

  <button class="tb-btn" id="btn-theme" title="Wissel donker/licht modus"><span id="theme-icon">☀️</span></button>

  <div id="label-filter-wrapper">
    <button class="tb-btn" id="btn-label-filter" title="Filter op labels">
      🏷️ Filter <span id="lf-badge">0</span>
    </button>
    <div id="label-filter-dropdown">
      <div id="lf-list"><div id="lf-empty">Geen filterwaarden gevonden</div></div>
      <button id="lf-clear">✕ Filter wissen</button>
    </div>
  </div>

<button class="tb-btn" id="btn-fit" title="Alles tonen">⊡ Fit</button>
  <button class="tb-btn" id="btn-export-img" title="Exporteer als afbeelding">🖼️ Export</button>

  <input type="text" id="search-bar" placeholder="Zoek titel/groep…">
  <div id="search-tools">
    <span id="search-count">0/0</span>
    <button id="search-prev" class="search-nav-btn" title="Vorige resultaat">↑</button>
    <button id="search-next" class="search-nav-btn" title="Volgende resultaat">↓</button>
  </div>

<!-- Canvas -->
<div id="canvas">
  <div id="world">
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#7c5cfc"/>
        </marker>
        <marker id="arrowhead-temp" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#5cf8c8"/>
        </marker>
      </defs>
      <g id="arrows-group"></g>
    </svg>
  </div>
</div>

<!-- Info panel -->
<div id="panel">
  <h2 id="panel-title">Informatie <button id="panel-close">✕</button></h2>
  <div id="view-content"></div>
</div>

<!-- Zoom controls -->
<div id="zoom-controls">
  <button class="zoom-btn" id="btn-zoom-in" title="Inzoomen">+</button>
  <div id="zoom-level-indicator">100%</div>
  <button class="zoom-btn" id="btn-zoom-out" title="Uitzoomen">−</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let nodes = [], arrows = [];
let nodeId = 0, arrowId = 0;
let zoomLevel = 1;
let selectedNodeId = null;
let panelTarget = null;

const canvas  = document.getElementById('canvas');
const world   = document.getElementById('world');
const svgLayer = document.getElementById('svg-layer');
const arrowsGroup = document.getElementById('arrows-group');
const panel   = document.getElementById('panel');
const searchBar = document.getElementById('search-bar');
const searchCount = document.getElementById('search-count');

// Active filters
const activeFilters = {
  keten: new Set(), behandelaarsgroep: new Set(), bitteam: new Set(),
  leverancier: new Set(), servicelevel: new Set(), label: new Set()
};

// ═══════════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════════
function showToast(msg, ms = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function normalizeKetens(values) {
  return (values || []).map(v => (v || '').trim()).filter(Boolean);
}
function getNodeKetens(node) {
  if (Array.isArray(node.ketens) && node.ketens.length > 0) return normalizeKetens(node.ketens);
  if (typeof node.keten === 'string' && node.keten.trim()) return normalizeKetens(node.keten.split(','));
  return [];
}
function getArrowKetens(arrow) {
  if (Array.isArray(arrow.ketens) && arrow.ketens.length > 0) return normalizeKetens(arrow.ketens);
  if (typeof arrow.keten === 'string' && arrow.keten.trim()) return normalizeKetens(arrow.keten.split(','));
  return [];
}

// ═══════════════════════════════════════════════════════════════════════════════
// NODE CREATION (read-only)
// ═══════════════════════════════════════════════════════════════════════════════
function createNode(x, y, shape = 'square', title = '', forceId = null) {
  const id = forceId || ('n' + (++nodeId));
  const el = document.createElement('div');
  el.className = `node shape-${shape}`;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.dataset.id = id;

  const initTitle = title || '';
  el.innerHTML = `
    <a class="node-link" target="_blank">🔗</a>
    <div class="node-thumb" id="thumb-${id}"></div>
    <div class="node-body">
      <div class="node-title" id="ntitle-${id}">${initTitle}</div>
      <div class="node-note" id="nnote-${id}"></div>
    </div>`;
  world.appendChild(el);

  const node = {
    id, x, y,
    width: shape === 'text' ? 150 : (shape === 'area' ? 440 : 220),
    height: shape === 'text' ? 50 : (shape === 'area' ? 380 : 190),
    shape, title: initTitle, url: '', note: '', bgColor: '#f1f5f9', color: '#1a1a2e',
    fontWeight: 'normal', fontStyle: 'normal', fontSize: 14,
    noteFontWeight: 'normal', noteFontStyle: 'normal', noteFontSize: 10,
    showImg: true, img: '', showNote: true,
    keten: '', ketens: [], behandelaarsgroep: '', bitteam: '', leverancier: '',
    servicelevel: '', filterLabel: '', pinned: false, rotation: 0, el
  };

  el.style.width  = node.width  + 'px';
  el.style.height = node.height + 'px';
  nodes.push(node);
  attachViewerNodeEvents(node);
  return node;
}

function attachViewerNodeEvents(node) {
  // Click only — no drag, no resize
  node.el.addEventListener('click', e => {
    e.stopPropagation();
    selectNodeForAnim(node.id);
    openNodeInfoPanel(node.id);
  });
}

function renderNode(n) {
  n.rotation = n.rotation || 0;
  n.el.style.transform = `rotate(${n.rotation}deg)`;
  const titleEl = document.getElementById('ntitle-' + n.id);
  if (!titleEl) return;
  titleEl.textContent = n.title || '';
  titleEl.style.fontWeight = n.fontWeight || 'normal';
  titleEl.style.fontStyle  = n.fontStyle  || 'normal';
  titleEl.style.fontSize   = (n.fontSize  || 14) + 'px';

  if (n.shape === 'area') {
    const hex = (n.bgColor || '#f1f5f9').replace('#', '');
    const r = parseInt(hex.slice(0,2), 16), g = parseInt(hex.slice(2,4), 16), b = parseInt(hex.slice(4,6), 16);
    n.el.style.backgroundColor = `rgba(${r},${g},${b},0.15)`;
  } else {
    n.el.style.backgroundColor = n.bgColor || '#f1f5f9';
  }
  n.el.style.color = n.color || '#1a1a2e';

  const linkEl = n.el.querySelector('.node-link');
  if (n.url) { linkEl.href = n.url; linkEl.style.display = 'flex'; }
  else { linkEl.style.display = 'none'; }

  const noteEl = document.getElementById('nnote-' + n.id);
  if (noteEl) {
    noteEl.textContent = n.note || '';
    noteEl.style.fontWeight = n.noteFontWeight || 'normal';
    noteEl.style.fontStyle  = n.noteFontStyle  || 'normal';
    noteEl.style.fontSize   = (n.noteFontSize  || 10) + 'px';
    noteEl.style.display = (n.showNote && n.note && n.note.trim()) ? 'block' : 'none';
  }

  const thumbEl = document.getElementById('thumb-' + n.id);
  if (thumbEl) {
    if (n.img && n.showImg) {
      thumbEl.classList.add('has-img');
      let imgEl = thumbEl.querySelector('img');
      if (!imgEl) { imgEl = document.createElement('img'); thumbEl.appendChild(imgEl); }
      imgEl.src = n.img;
    } else {
      thumbEl.classList.remove('has-img');
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ANCHOR MATH
// ═══════════════════════════════════════════════════════════════════════════════
function getAnchorPos(node, port) {
  let px = 0.5, py = 0.5;
  if (port===0) { px=0.5; py=0; } else if (port===1) { px=1; py=0; }
  else if (port===2) { px=1; py=0.5; } else if (port===3) { px=1; py=1; }
  else if (port===4) { px=0.5; py=1; } else if (port===5) { px=0; py=1; }
  else if (port===6) { px=0; py=0.5; } else if (port===7) { px=0; py=0; }

  if (node.shape === 'oval') {
    const a = node.width/2, b = node.height/2;
    const cx = node.x + a, cy = node.y + b;
    const angle = (port * 45 - 90) * (Math.PI / 180);
    return { x: cx + a * Math.cos(angle), y: cy + b * Math.sin(angle) };
  }
  return { x: node.x + node.width * px, y: node.y + node.height * py };
}

// ═══════════════════════════════════════════════════════════════════════════════
// ARROW CREATION (read-only)
// ═══════════════════════════════════════════════════════════════════════════════
function createArrow(fromId, toId, fromPort = 4, toPort = 0, forceId = null) {
  const id = forceId || ('a' + (++arrowId));

  const bgPathEl  = document.createElementNS('http://www.w3.org/2000/svg', 'path'); bgPathEl.classList.add('arrow-bg');
  const pathEl    = document.createElementNS('http://www.w3.org/2000/svg', 'path'); pathEl.classList.add('arrow-path'); pathEl.id = 'path-' + id;
  const hitEl     = document.createElementNS('http://www.w3.org/2000/svg', 'path'); hitEl.classList.add('arrow-hit');
  const dotEl     = document.createElementNS('http://www.w3.org/2000/svg', 'circle'); dotEl.setAttribute('r','5'); dotEl.setAttribute('fill','#5cf8c8'); dotEl.style.display='none';
  const labelEl   = document.createElementNS('http://www.w3.org/2000/svg', 'text'); labelEl.setAttribute('fill','#b0b0d0'); labelEl.setAttribute('font-size','11'); labelEl.setAttribute('text-anchor','middle');
  const noteEl    = document.createElementNS('http://www.w3.org/2000/svg', 'text'); noteEl.setAttribute('fill','#a0a0c0'); noteEl.setAttribute('font-size','10'); noteEl.setAttribute('font-style','italic'); noteEl.setAttribute('text-anchor','middle'); noteEl.style.display='none';
  const urlLinkEl = document.createElementNS('http://www.w3.org/2000/svg', 'a'); urlLinkEl.setAttribute('target','_blank');
  const urlIconEl = document.createElementNS('http://www.w3.org/2000/svg', 'text'); urlIconEl.setAttribute('font-size','12'); urlIconEl.setAttribute('fill','#7c5cfc'); urlIconEl.setAttribute('pointer-events','all'); urlIconEl.style.cursor='pointer'; urlIconEl.style.display='none'; urlIconEl.textContent='🔗';
  urlLinkEl.appendChild(urlIconEl);

  [bgPathEl, pathEl, hitEl, dotEl, labelEl, noteEl, urlLinkEl].forEach(el => arrowsGroup.appendChild(el));

  // Per-arrow unique marker
  const markerId = 'arrowhead-' + id;
  const markerEl = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  markerEl.setAttribute('id', markerId); markerEl.setAttribute('markerWidth','8'); markerEl.setAttribute('markerHeight','8'); markerEl.setAttribute('refX','7'); markerEl.setAttribute('refY','3'); markerEl.setAttribute('orient','auto');
  const markerPathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  markerPathEl.setAttribute('d','M0,0 L0,6 L8,3 z'); markerPathEl.setAttribute('fill','#7c5cfc');
  markerEl.appendChild(markerPathEl);
  document.querySelector('defs').appendChild(markerEl);

  const dotEl2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle'); dotEl2.setAttribute('r','5'); dotEl2.setAttribute('fill','#5cf8c8'); dotEl2.style.display='none';
  arrowsGroup.appendChild(dotEl2);

  const markerStartId = 'arrowhead-start-' + id;
  const markerStartEl = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  markerStartEl.setAttribute('id', markerStartId); markerStartEl.setAttribute('markerWidth','8'); markerStartEl.setAttribute('markerHeight','8'); markerStartEl.setAttribute('refX','1'); markerStartEl.setAttribute('refY','3'); markerStartEl.setAttribute('orient','auto-start-reverse');
  const markerStartPathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  markerStartPathEl.setAttribute('d','M0,0 L0,6 L8,3 z'); markerStartPathEl.setAttribute('fill','#7c5cfc');
  markerStartEl.appendChild(markerStartPathEl);
  document.querySelector('defs').appendChild(markerStartEl);

  const arrow = {
    id, from: fromId, to: toId, fromPort, toPort,
    label: '', shape: 'straight', color: '#7c5cfc', anim: 'normal', style: 'dot',
    note: '', showNote: false, url: '', filterLabel: '',
    keten: '', ketens: [], behandelaarsgroep: '', bitteam: '', leverancier: '', servicelevel: '',
    bidirectional: false, routeMode: 'auto', waypoints: [],
    pathEl, bgPathEl, hitEl, dotEl, dotEl2, labelEl, noteEl, urlLinkEl, urlIconEl,
    _animFrame: null, dashOffset: 0, markerEl, markerPathEl, markerStartEl, markerStartPathEl
  };
  arrows.push(arrow);

  // Click to open info panel (view only)
  hitEl.addEventListener('click', e => {
    e.stopPropagation();
    openArrowInfoPanel(id);
  });

  urlIconEl.addEventListener('click', e => {
    e.stopPropagation();
    if (arrow.url) window.open(arrow.url, '_blank');
  });

  updateArrow(arrow);
  return arrow;
}

function updateArrow(arrow) {
  const f = nodes.find(n => n.id === arrow.from), t = nodes.find(n => n.id === arrow.to);
  if (!f || !t) return;
  let p1 = getAnchorPos(f, arrow.fromPort), p2 = getAnchorPos(t, arrow.toPort);

  if (arrow.bidirectional) {
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    p1 = { x: p1.x + dx/len * 14, y: p1.y + dy/len * 14 };
  }

  let d = '';
  if (arrow.routeMode === 'custom' && arrow.waypoints && arrow.waypoints.length > 0) {
    d = `M ${p1.x} ${p1.y}`;
    arrow.waypoints.forEach(wp => { d += ` L ${wp.x} ${wp.y}`; });
    d += ` L ${p2.x} ${p2.y}`;
  } else if (arrow.shape === 'straight') {
    d = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
  } else {
    const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.sqrt(dx*dx+dy*dy), offset = Math.min(60, len*0.3);
    const nx = -dy/len, ny = dx/len;
    d = `M ${p1.x} ${p1.y} Q ${p1.x+dx/2+nx*offset} ${p1.y+dy/2+ny*offset} ${p2.x} ${p2.y}`;
  }

  arrow.bgPathEl.setAttribute('d', d);
  arrow.pathEl.setAttribute('d', d);
  arrow.hitEl.setAttribute('d', d);
  arrow.pathEl.style.stroke = arrow.color;
  if (arrow.markerPathEl) arrow.markerPathEl.setAttribute('fill', arrow.color);
  if (arrow.markerStartPathEl) arrow.markerStartPathEl.setAttribute('fill', arrow.color);
  arrow.pathEl.setAttribute('marker-end', `url(#${arrow.markerEl.id})`);
  arrow.pathEl.setAttribute('marker-start', arrow.bidirectional ? `url(#${arrow.markerStartEl.id})` : '');

  const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
  arrow.labelEl.setAttribute('x', mx); arrow.labelEl.setAttribute('y', my - 10);
  arrow.labelEl.textContent = arrow.label || '';

  if (arrow.noteEl) {
    if (arrow.showNote && arrow.note) {
      arrow.noteEl.style.display = '';
      arrow.noteEl.setAttribute('x', mx); arrow.noteEl.setAttribute('y', my + 16);
      arrow.noteEl.textContent = arrow.note;
    } else { arrow.noteEl.style.display = 'none'; }
  }

  if (arrow.urlIconEl && arrow.urlLinkEl) {
    if (arrow.url) {
      arrow.urlIconEl.style.display = '';
      arrow.urlIconEl.setAttribute('x', mx + (arrow.label || '').length * 3.5 + 14);
      arrow.urlIconEl.setAttribute('y', my - 10);
      arrow.urlLinkEl.setAttribute('href', arrow.url);
    } else { arrow.urlIconEl.style.display = 'none'; }
  }

  if (arrow.style === 'dashed') {
    arrow.pathEl.style.strokeDasharray = '8,8'; arrow.dotEl.style.display = 'none';
  } else {
    arrow.pathEl.style.strokeDasharray = 'none';
  }
}

function updateArrows() { arrows.forEach(updateArrow); }

function startDotAnimation(arrow) {
  if (arrow._animFrame) cancelAnimationFrame(arrow._animFrame);
  let t = 0;
  function tick() {
    if (arrow.anim === 'none') { arrow.dotEl.style.display = 'none'; return; }
    const speed = arrow.anim === 'fast' ? 0.008 : 0.003;
    if (arrow.style === 'dashed') {
      arrow.dashOffset -= speed * 200;
      arrow.pathEl.style.strokeDashoffset = arrow.dashOffset;
      if (arrow.bidirectional && arrow._dashPath2) {
        arrow._dashPath2.setAttribute('d', arrow.pathEl.getAttribute('d'));
        arrow._dashPath2.style.stroke = arrow.color;
        arrow._dashPath2.style.strokeDasharray = '8,8';
        arrow._dashPath2.style.strokeDashoffset = -arrow.dashOffset;
      }
    } else {
      t = (t + speed) % 1;
      arrow.dotEl.style.display = '';
      try {
        const pt = arrow.pathEl.getPointAtLength(t * arrow.pathEl.getTotalLength());
        arrow.dotEl.setAttribute('cx', pt.x); arrow.dotEl.setAttribute('cy', pt.y);
      } catch(e) {}
      if (arrow.bidirectional && arrow.dotEl2) {
        const t2 = (1 - t) % 1;
        arrow.dotEl2.style.display = '';
        try {
          const pt2 = arrow.pathEl.getPointAtLength(t2 * arrow.pathEl.getTotalLength());
          arrow.dotEl2.setAttribute('cx', pt2.x); arrow.dotEl2.setAttribute('cy', pt2.y);
        } catch(e) {}
      } else if (arrow.dotEl2) { arrow.dotEl2.style.display = 'none'; }
    }
    arrow._animFrame = requestAnimationFrame(tick);
  }
  tick();
}

function startAllAnimations() {
  arrows.forEach(a => startDotAnimation(a));
}

function selectNodeForAnim(id) {
  document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight','dimmed','connected-highlight'));
  arrows.forEach(a => {
    if (a._animFrame) cancelAnimationFrame(a._animFrame);
    a._animFrame = null; a.dotEl.style.display = 'none';
    a.pathEl.classList.remove('active-connection','arrow-dimmed');
    a.pathEl.style.strokeWidth = '';
    if (a.style === 'dashed') a.pathEl.style.strokeDashoffset = '';
  });
  if (selectedNodeId === id) { selectedNodeId = null; startAllAnimations(); return; }
  selectedNodeId = id;
  const selEl = document.querySelector(`.node[data-id="${id}"]`);
  if (selEl) selEl.classList.add('highlight');
  const connectedArrows = arrows.filter(a => a.from === id || a.to === id);
  const connectedNodeIds = new Set(connectedArrows.map(a => a.from === id ? a.to : a.from));
  nodes.forEach(n => { if (n.id !== id && connectedNodeIds.has(n.id)) n.el.classList.add('connected-highlight'); });
  arrows.forEach(a => {
    if (a.from === id || a.to === id) { a.pathEl.classList.add('active-connection'); startDotAnimation(a); }
  });
}

// SEARCH
// ═══════════════════════════════════════════════════════════════════════════════
let searchMatches = [], searchMatchIndex = -1;

function updateSearchCount() {
  if (!searchCount) return;
  searchCount.textContent = searchMatches.length === 0 ? '0/0' : `${searchMatchIndex+1}/${searchMatches.length}`;
}

function focusSearchMatch(index) {
  if (searchMatches.length === 0) return;
  searchMatchIndex = ((index % searchMatches.length) + searchMatches.length) % searchMatches.length;
  const match = searchMatches[searchMatchIndex];
  document.querySelectorAll('.node').forEach(el => el.classList.remove('search-active'));
  if (match && match.el) {
    match.el.classList.add('search-active');
    const newLeft = -match.x * zoomLevel + canvas.offsetWidth / 2 - match.width / 2;
    const newTop  = -match.y * zoomLevel + canvas.offsetHeight / 2 - match.height / 2;
    world.style.left = newLeft + 'px';
    world.style.top  = newTop  + 'px';
  }
  updateSearchCount();
}

function runSearch() {
  const q = searchBar.value.trim().toLowerCase();
  document.querySelectorAll('.node').forEach(el => el.classList.remove('search-active'));
  if (!q) { searchMatches = []; searchMatchIndex = -1; updateSearchCount(); return; }
  searchMatches = nodes.filter(n => {
    const fields = [n.title, n.behandelaarsgroep, n.bitteam, n.leverancier, n.servicelevel, n.note, n.filterLabel,
      getNodeKetens(n).join(' ')].join(' ').toLowerCase();
    return fields.includes(q);
  });
  searchMatchIndex = -1;
  focusSearchMatch(0);
}

searchBar.addEventListener('input', runSearch);
document.getElementById('search-next').addEventListener('click', () => focusSearchMatch(searchMatchIndex + 1));
document.getElementById('search-prev').addEventListener('click', () => focusSearchMatch(searchMatchIndex - 1));
searchBar.addEventListener('keydown', e => {
  if (e.key === 'Enter') focusSearchMatch(e.shiftKey ? searchMatchIndex - 1 : searchMatchIndex + 1);
});

// ═══════════════════════════════════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════════════════════════════════
let panStart = null, panOrigin = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => {
  if (e.button === 0 && (e.target === canvas || e.target === world || e.target.tagName === 'svg')) {
    panStart = { x: e.clientX, y: e.clientY };
    panOrigin = { x: parseFloat(world.style.left)||0, y: parseFloat(world.style.top)||0 };
    canvas.classList.add('panning');
  }
  // Middle button pan
  if (e.button === 1) {
    panStart = { x: e.clientX, y: e.clientY };
    panOrigin = { x: parseFloat(world.style.left)||0, y: parseFloat(world.style.top)||0 };
    canvas.classList.add('panning');
  }
});

function clampPan() {
  if (nodes.length === 0) return;
  const MARGIN = 100; // minimaal 100px van het project blijft zichtbaar
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);       minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + n.height);
  });
  const left = parseFloat(world.style.left) || 0;
  const top  = parseFloat(world.style.top)  || 0;
  const cW = canvas.offsetWidth, cH = canvas.offsetHeight;
  // schermcoördinaten van de projectranden
  const cL = left + minX * zoomLevel, cR = left + maxX * zoomLevel;
  const cT = top  + minY * zoomLevel, cB = top  + maxY * zoomLevel;
  let nL = left, nT = top;
  if (cR < MARGIN)       nL = left + (MARGIN - cR);       // rechterrand te ver naar links
  if (cL > cW - MARGIN)  nL = left - (cL - (cW - MARGIN)); // linkerrand te ver naar rechts
  if (cB < MARGIN)       nT = top  + (MARGIN - cB);       // onderrand te ver omhoog
  if (cT > cH - MARGIN)  nT = top  - (cT - (cH - MARGIN)); // bovenrand te ver omlaag
  world.style.left = nL + 'px';
  world.style.top  = nT + 'px';
}

document.addEventListener('mousemove', e => {
  if (!panStart) return;
  world.style.left = (panOrigin.x + e.clientX - panStart.x) + 'px';
  world.style.top  = (panOrigin.y + e.clientY - panStart.y) + 'px';
  clampPan();
});

document.addEventListener('mouseup', () => {
  panStart = null;
  canvas.classList.remove('panning');
});

// Scroll to zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wx = (mx - (parseFloat(world.style.left)||0)) / zoomLevel;
  const wy = (my - (parseFloat(world.style.top)||0)) / zoomLevel;
  const delta = e.deltaY < 0 ? 1.1 : 0.9;
  zoomLevel = Math.min(3, Math.max(0.15, zoomLevel * delta));
  world.style.transform = `scale(${zoomLevel})`;
  world.style.left = (mx - wx * zoomLevel) + 'px';
  world.style.top  = (my - wy * zoomLevel) + 'px';
  document.getElementById('zoom-level-indicator').textContent = Math.round(zoomLevel * 100) + '%';
  clampPan();
}, { passive: false });

document.getElementById('btn-zoom-in').addEventListener('click', () => applyZoom(zoomLevel * 1.2));
document.getElementById('btn-zoom-out').addEventListener('click', () => applyZoom(zoomLevel * 0.8));

function applyZoom(newZoom) {
  const cx = canvas.offsetWidth / 2, cy = canvas.offsetHeight / 2;
  const wx = (cx - (parseFloat(world.style.left)||0)) / zoomLevel;
  const wy = (cy - (parseFloat(world.style.top)||0)) / zoomLevel;
  zoomLevel = Math.min(3, Math.max(0.15, newZoom));
  world.style.transform = `scale(${zoomLevel})`;
  world.style.left = (cx - wx * zoomLevel) + 'px';
  world.style.top  = (cy - wy * zoomLevel) + 'px';
  document.getElementById('zoom-level-indicator').textContent = Math.round(zoomLevel * 100) + '%';
  clampPan();
}

// ═══════════════════════════════════════════════════════════════════════════════
// FIT TO CONTENT — shows all nodes, no empty canvas
// ═══════════════════════════════════════════════════════════════════════════════
function fitToContent(padding = 60) {
  if (nodes.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width);
    maxY = Math.max(maxY, n.y + n.height);
  });

  const contentW = maxX - minX + padding * 2;
  const contentH = maxY - minY + padding * 2;
  const canvasW  = canvas.offsetWidth;
  const canvasH  = canvas.offsetHeight;

  const scaleX = canvasW / contentW;
  const scaleY = canvasH / contentH;
  zoomLevel = Math.min(scaleX, scaleY, 1.5); // don't zoom in more than 150%

  const scaledW = contentW * zoomLevel;
  const scaledH = contentH * zoomLevel;

  world.style.transform = `scale(${zoomLevel})`;
  world.style.left = ((canvasW - scaledW) / 2 - (minX - padding) * zoomLevel) + 'px';
  world.style.top  = ((canvasH - scaledH) / 2 - (minY - padding) * zoomLevel) + 'px';
  document.getElementById('zoom-level-indicator').textContent = Math.round(zoomLevel * 100) + '%';
}

document.getElementById('btn-fit').addEventListener('click', () => fitToContent());

// EXPORT IMAGE
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('btn-export-img').addEventListener('click', async () => {
  panel.classList.remove('open');
  document.body.classList.add('exporting');
  showToast('Afbeelding exporteren…', 3000);
  await new Promise(r => setTimeout(r, 100));
  try {
    const savedZoom = zoomLevel;
    const savedLeft = world.style.left, savedTop = world.style.top;

    // Temporarily set zoom=1 and position world at origin so html2canvas captures correctly
    zoomLevel = 1;
    world.style.transform = 'scale(1)';

    if (nodes.length > 0) {
      const PADDING = 40;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodes.forEach(n => {
        minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
        maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + n.height);
      });
      world.style.left = (-minX + PADDING) + 'px';
      world.style.top  = (-minY + PADDING) + 'px';

      const W = maxX - minX + PADDING * 2;
      const H = maxY - minY + PADDING * 2;

      const c2 = await html2canvas(canvas, {
        backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#f8f9fc',
        width: W, height: H,
        scrollX: 0, scrollY: 0,
        logging: false,
        useCORS: true
      });

      const a = document.createElement('a');
      a.href = c2.toDataURL('image/png');
      a.download = (document.getElementById('project-name').textContent || 'visual-board') + '.png';
      a.click();
      showToast('Export klaar! ✓');
    }

    // Restore
    zoomLevel = savedZoom;
    world.style.transform = `scale(${savedZoom})`;
    world.style.left = savedLeft;
    world.style.top  = savedTop;
  } catch(err) {
    showToast('Export mislukt: ' + err.message);
  }
  document.body.classList.remove('exporting');
});

// ═══════════════════════════════════════════════════════════════════════════════
// LABEL FILTER
// ═══════════════════════════════════════════════════════════════════════════════
function getAllLabels() {
  const s = new Set();
  nodes.forEach(n => (n.filterLabel||'').split(',').map(l=>l.trim()).filter(Boolean).forEach(l=>s.add(l)));
  arrows.forEach(a => (a.filterLabel||'').split(',').map(l=>l.trim()).filter(Boolean).forEach(l=>s.add(l)));
  return [...s];
}
function activeFiltersEmpty() {
  return Object.values(activeFilters).every(s => s.size === 0);
}
function activeFiltersCount() {
  return Object.values(activeFilters).reduce((t, s) => t + s.size, 0);
}
function nodeMatches(n) {
  if (activeFilters.keten.size > 0 && getNodeKetens(n).some(k => activeFilters.keten.has(k))) return true;
  if (activeFilters.behandelaarsgroep.size > 0 && activeFilters.behandelaarsgroep.has(n.behandelaarsgroep)) return true;
  if (activeFilters.bitteam.size > 0 && activeFilters.bitteam.has(n.bitteam)) return true;
  if (activeFilters.leverancier.size > 0 && activeFilters.leverancier.has(n.leverancier)) return true;
  if (activeFilters.servicelevel.size > 0 && activeFilters.servicelevel.has(n.servicelevel)) return true;
  if (activeFilters.label.size > 0) {
    const lbls = (n.filterLabel||'').split(',').map(l=>l.trim()).filter(Boolean);
    if (lbls.some(l => activeFilters.label.has(l))) return true;
  }
  return false;
}
function arrowMatches(a) {
  if (activeFilters.keten.size > 0 && getArrowKetens(a).some(k => activeFilters.keten.has(k))) return true;
  if (activeFilters.behandelaarsgroep.size > 0 && activeFilters.behandelaarsgroep.has(a.behandelaarsgroep)) return true;
  if (activeFilters.leverancier.size > 0 && activeFilters.leverancier.has(a.leverancier)) return true;
  if (activeFilters.servicelevel.size > 0 && activeFilters.servicelevel.has(a.servicelevel)) return true;
  if (activeFilters.label.size > 0) {
    const lbls = (a.filterLabel||'').split(',').map(l=>l.trim()).filter(Boolean);
    if (lbls.some(l => activeFilters.label.has(l))) return true;
  }
  return false;
}
function applyLabelFilter() {
  if (activeFiltersEmpty()) {
    nodes.forEach(n => { n.el.style.opacity = ''; n.el.style.filter = ''; });
    arrows.forEach(a => {
      [a.pathEl, a.bgPathEl, a.hitEl, a.dotEl, a.labelEl, a.noteEl, a.urlLinkEl]
        .forEach(el => { if (el) { el.style.opacity = ''; el.style.display = ''; } });
      updateArrow(a);
    });
  } else {
    nodes.forEach(n => {
      const match = nodeMatches(n);
      n.el.style.opacity = match ? '' : '0.15';
      n.el.style.filter  = match ? '' : 'grayscale(1)';
    });
    arrows.forEach(a => {
      const match = arrowMatches(a);
      if (!match && a._animFrame) { cancelAnimationFrame(a._animFrame); a._animFrame = null; if (a.dotEl) a.dotEl.style.display = 'none'; }
      else if (match) updateArrow(a);
      [a.pathEl, a.bgPathEl, a.hitEl, a.labelEl, a.noteEl, a.urlLinkEl]
        .forEach(el => { if (el) el.style.opacity = match ? '' : '0.12'; });
    });
  }
}
function updateFilterBadge() {
  const badge = document.getElementById('lf-badge');
  const btn   = document.getElementById('btn-label-filter');
  if (activeFiltersCount() > 0) { badge.textContent = activeFiltersCount(); badge.style.display = 'inline'; btn.classList.add('active'); }
  else { badge.style.display = 'none'; btn.classList.remove('active'); }
}
function renderLabelFilterDropdown() {
  const list = document.getElementById('lf-list');
  list.innerHTML = '';
  const sections = [
    { key:'keten',             icon:'🔗', label:'Keten',            values:[...new Set([...nodes.flatMap(n => getNodeKetens(n)), ...arrows.flatMap(a => getArrowKetens(a))].filter(Boolean))] },
    { key:'behandelaarsgroep', icon:'👥', label:'Behandelaarsgroep', values:[...new Set([...nodes.map(n=>n.behandelaarsgroep), ...arrows.map(a=>a.behandelaarsgroep)].filter(Boolean))] },
    { key:'bitteam',           icon:'🛠️', label:'BIT TEAM',          values:[...new Set(nodes.map(n=>n.bitteam).filter(Boolean))] },
    { key:'leverancier',       icon:'🏢', label:'Leverancier',       values:[...new Set([...nodes.map(n=>n.leverancier), ...arrows.map(a=>a.leverancier)].filter(Boolean))] },
    { key:'servicelevel',      icon:'📊', label:'Servicelevel',      values:[...new Set(nodes.map(n=>n.servicelevel).filter(Boolean))] },
    { key:'label',             icon:'🏷️', label:'Label',             values:getAllLabels() },
  ];
  let hasAny = false;
  sections.forEach(sec => {
    if (sec.values.length === 0) return;
    hasAny = true;
    const hdr = document.createElement('div'); hdr.className = 'lf-section-header'; hdr.textContent = sec.icon + ' ' + sec.label;
    list.appendChild(hdr);
    sec.values.sort().forEach(val => {
      const item = document.createElement('label'); item.className = 'lf-item';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = activeFilters[sec.key]?.has(val) || false;
      cb.addEventListener('change', () => {
        if (cb.checked) activeFilters[sec.key].add(val); else activeFilters[sec.key].delete(val);
        applyLabelFilter(); updateFilterBadge();
      });
      item.appendChild(cb); item.appendChild(document.createTextNode(val));
      list.appendChild(item);
    });
  });
  if (!hasAny) list.innerHTML = '<div id="lf-empty">Geen filterwaarden gevonden</div>';
}

document.getElementById('btn-label-filter').addEventListener('click', e => {
  e.stopPropagation(); renderLabelFilterDropdown();
  document.getElementById('label-filter-dropdown').classList.toggle('show');
});
document.getElementById('label-filter-dropdown').addEventListener('click', e => e.stopPropagation());
document.getElementById('lf-clear').addEventListener('click', () => {
  Object.values(activeFilters).forEach(s => s.clear());
  applyLabelFilter(); updateFilterBadge(); renderLabelFilterDropdown();
});
window.addEventListener('click', () => document.getElementById('label-filter-dropdown').classList.remove('show'));

// ═══════════════════════════════════════════════════════════════════════════════
// LOAD PROJECT FROM URL ?src=
// ═══════════════════════════════════════════════════════════════════════════════
function loadProjectData(data) {
  // Clear existing
  nodes.forEach(n => n.el.remove());
  arrows.forEach(a => removeArrowEls(a));
  nodes = []; arrows = [];
  nodeId = data.nodeId || 0;
  arrowId = data.arrowId || 0;

  // Create nodes
  data.nodes.forEach(nd => {
    const n = createNode(nd.x, nd.y, nd.shape || 'square', nd.title, nd.id);
    const savedEl = n.el;
    Object.assign(n, nd);
    n.el = savedEl;
    n.el.style.width  = n.width  + 'px';
    n.el.style.height = n.height + 'px';
    renderNode(n);
  });

  // Create arrows
  data.arrows.forEach(ad => {
    const a = createArrow(ad.from, ad.to, ad.fromPort, ad.toPort, ad.id);
    const savedEls = {
      pathEl: a.pathEl, bgPathEl: a.bgPathEl, hitEl: a.hitEl,
      dotEl: a.dotEl, dotEl2: a.dotEl2, labelEl: a.labelEl, noteEl: a.noteEl,
      urlLinkEl: a.urlLinkEl, urlIconEl: a.urlIconEl,
      markerEl: a.markerEl, markerPathEl: a.markerPathEl,
      markerStartEl: a.markerStartEl, markerStartPathEl: a.markerStartPathEl,
      _dashPath2: a._dashPath2
    };
    Object.assign(a, ad);
    Object.assign(a, savedEls);
    updateArrow(a);
  });

  startAllAnimations();
  setTimeout(() => fitToContent(), 50);
}

function removeArrowEls(a) {
  if (a._animFrame) cancelAnimationFrame(a._animFrame);
  [a.bgPathEl, a.pathEl, a.hitEl, a.dotEl, a.dotEl2, a.labelEl, a.noteEl, a.urlLinkEl].forEach(el => { if (el) el.remove(); });
  if (a.markerEl) a.markerEl.remove();
  if (a.markerStartEl) a.markerStartEl.remove();
  if (a._dashPath2) a._dashPath2.remove();
}

async function loadFromUrl() {
  const src = getParam('src');
  if (!src) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-overlay').classList.add('show');
    document.getElementById('err-msg').innerHTML =
      'Geen <code>src</code> parameter gevonden in de URL.<br><br>Verwacht formaat:<br><code>viewer.html?src=projects/project1.json</code>';
    return;
  }

  // Derive project name from filename
  const filename = src.split('/').pop().replace('.json', '');
  document.getElementById('project-name').textContent = filename;
  document.title = filename + ' – Visual Board Viewer';

  try {
    const resp = await fetch(src);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} – ${resp.statusText}`);
    const data = await resp.json();
    loadProjectData(data);
    document.getElementById('loading-overlay').style.display = 'none';
  } catch(err) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-overlay').classList.add('show');
    document.getElementById('err-msg').innerHTML =
      `Kan <code>${escHtml(src)}</code> niet laden.<br><br>` +
      `Foutmelding: <b>${escHtml(err.message)}</b><br><br>` +
      `Zorg dat het JSON-bestand op dezelfde server staat (CORS) en de URL correct is.`;
  }
}
